name: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6
        pip install vnpy vnpy_ctastrategy vnpy_ctabacktester vnpy_datamanager

    - name: Build EXE
      run: |
        pyinstaller app.spec --clean --noconfirm
        dir dist

    - name: Create ZIP
      if: success()
      shell: pwsh
      run: |
        $items = Get-ChildItem -Path dist -Directory
        if ($items) {
            $folder = $items[0].Name
            Compress-Archive -Path "dist/$folder" -DestinationPath "dist/${folder}.zip" -Force
            ls dist/*.zip
        }

    - name: Upload artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AIQuantSoftware-EXE
        path: dist/*.zip
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.zip
        tag_name: v${{ github.run_number }}
        body: |
          ## AI量化软件 Windows EXE
          自动构建版本 #${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
